name: NSE Weekly Sector Scan

on:
  schedule:
    - cron: "0 2 * * 1"   # Sunday 9PM EST = Monday 2AM UTC
  workflow_dispatch:        # Manual trigger anytime

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write       # needed to push results back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Run NSE Sector Scanner
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID:  ${{ secrets.NOTION_DB_ID }}
        run: python scanner.py

      - name: Generate Heatmap HTML
        run: python generate_heatmap.py

      - name: Commit results back to repo
        run: |
          git config user.email "actions@github.com"
          git config user.name  "NSE Scanner Bot"
          git add sector_heatmap_data.json sector_heatmap.html
          git diff --staged --quiet || git commit -m "📊 Weekly scan $(date -u '+%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nse-scan-${{ github.run_number }}
          path: |
            sector_heatmap_data.json
            sector_heatmap.html
          retention-days: 30
