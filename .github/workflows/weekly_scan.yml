name: NSE Weekly Sector Scan

on:
  schedule:
    # Every Sunday at 9:00 PM EST = Monday 02:00 AM UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:  # Allow manual trigger anytime

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout repo ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy requests jugaad-data

      # ── 4. Run the scanner ────────────────────────────────
      - name: Run NSE Sector Scanner
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID:  ${{ secrets.NOTION_DB_ID }}
        run: |
          python scanner.py

      # ── 5. Generate heatmap HTML from JSON ───────────────
      - name: Generate Heatmap HTML
        run: |
          python generate_heatmap.py

      # ── 6. Commit updated data files back to repo ────────
      - name: Commit scan results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "NSE Scanner Bot"
          git add sector_heatmap_data.json sector_heatmap.html
          git diff --staged --quiet || git commit -m "📊 Weekly scan: $(date -u '+%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 7. Upload artifacts (download from Actions tab) ───
      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nse-scan-${{ github.run_number }}
          path: |
            sector_heatmap_data.json
            sector_heatmap.html
          retention-days: 30
