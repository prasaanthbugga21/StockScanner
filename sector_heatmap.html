<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSE Sector Pulse — Minervini × Qullamaggie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #09090f;
    --surface:  #0f0f1a;
    --border:   #1e1e30;
    --text:     #e0e0f0;
    --muted:    #5a5a80;
    --accent:   #7b61ff;

    --bull-5:   #00ff88;
    --bull-4:   #00e07a;
    --bull-3:   #23c56e;
    --bull-2:   #1aaa5c;
    --bull-1:   #127a41;
    --neutral:  #2a2a3d;
    --bear-1:   #7a1f2e;
    --bear-2:   #a02030;
    --bear-3:   #c62535;
    --bear-4:   #e62a3c;
    --bear-5:   #ff2d42;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SCANLINE OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── HEADER ── */
  header {
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .logo-area h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1;
    color: #fff;
  }

  .logo-area h1 span {
    color: var(--accent);
  }

  .logo-area p {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .scan-meta {
    text-align: right;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    line-height: 1.8;
  }

  .scan-meta .pulse {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--bull-3);
    margin-right: 6px;
    animation: blink 1.4s ease-in-out infinite;
    vertical-align: middle;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* ── LEGEND ── */
  .legend-strip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 40px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .legend-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-right: 4px;
  }

  .legend-bar {
    display: flex;
    gap: 3px;
    align-items: center;
  }

  .legend-swatch {
    width: 28px;
    height: 14px;
    border-radius: 2px;
    font-size: 0;
  }

  .legend-endpoints {
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    color: var(--muted);
    margin: 0 4px;
  }

  .legend-sep { flex: 1; }

  /* ── METRIC TABS ── */
  .metric-tabs {
    display: flex;
    gap: 0;
    padding: 16px 40px 0;
  }

  .tab {
    padding: 8px 20px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    border-bottom: none;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg);
    position: relative;
    top: 1px;
  }

  .tab:first-child { border-radius: 6px 0 0 0; }
  .tab:last-child  { border-radius: 0 6px 0 0; }

  .tab.active {
    color: var(--text);
    background: var(--surface);
    border-color: var(--accent);
    border-bottom: 1px solid var(--surface);
  }

  .tab:hover:not(.active) { color: var(--text); }

  /* ── HEATMAP CONTAINER ── */
  .heatmap-wrap {
    padding: 0 40px 24px;
    border-top: 1px solid var(--accent);
  }

  .heatmap-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
    padding-top: 20px;
  }

  /* ── SECTOR CARD ── */
  .sector-card {
    border-radius: 10px;
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
    position: relative;
  }

  .sector-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    z-index: 10;
  }

  .card-header {
    padding: 14px 18px 10px;
    position: relative;
  }

  .card-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 18px; right: 18px;
    height: 1px;
    background: rgba(255,255,255,0.06);
  }

  .sector-name {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: -0.2px;
    color: #fff;
  }

  .sector-signal {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── SCORE RING ── */
  .score-area {
    position: absolute;
    top: 12px; right: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .score-ring {
    width: 52px; height: 52px;
    position: relative;
  }

  .score-ring svg {
    transform: rotate(-90deg);
  }

  .score-ring .track {
    fill: none;
    stroke: rgba(255,255,255,0.06);
    stroke-width: 5;
  }

  .score-ring .fill {
    fill: none;
    stroke-width: 5;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1);
  }

  .score-number {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    color: #fff;
  }

  /* ── MINI BARS ── */
  .card-body {
    padding: 12px 18px 14px;
    display: grid;
    gap: 8px;
  }

  .metric-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .metric-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    width: 64px;
    flex-shrink: 0;
  }

  .metric-bar-wrap {
    flex: 1;
    height: 5px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    overflow: hidden;
  }

  .metric-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }

  .metric-value {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--text);
    width: 32px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ── SURGE BADGE ── */
  .surge-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
    margin-top: 6px;
  }

  .surge-badge.bullish {
    background: rgba(0,255,136,0.1);
    color: var(--bull-3);
    border: 1px solid rgba(0,255,136,0.2);
  }

  .surge-badge.neutral {
    background: rgba(255,255,255,0.04);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  /* ── DETAIL DRAWER ── */
  .drawer-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .drawer-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .drawer {
    position: fixed;
    top: 0; right: 0;
    width: 420px;
    max-width: 100vw;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 0;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    z-index: 1001;
  }

  .drawer.open { transform: translateX(0); }

  .drawer-header {
    padding: 24px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 2;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .drawer-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 30px; height: 30px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s;
    flex-shrink: 0;
  }

  .drawer-close:hover { color: var(--text); }

  .drawer-body { padding: 20px 24px; }

  .drawer-sector-title {
    font-size: 1.4rem;
    font-weight: 800;
    color: #fff;
  }

  .drawer-date {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: 4px;
  }

  .drawer-score-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin: 20px 0;
  }

  .score-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 12px;
    text-align: center;
  }

  .score-box .sb-value {
    font-family: 'Space Mono', monospace;
    font-size: 1.3rem;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }

  .score-box .sb-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.5rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 6px;
  }

  /* ── STOCK TABLE ── */
  .stock-table-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
  }

  thead th {
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.12s;
  }

  tbody tr:hover { background: rgba(255,255,255,0.03); }

  tbody td {
    padding: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
  }

  .tick { font-weight: 700; color: var(--text); }

  .pass-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
  }

  .pass-dot.yes { background: var(--bull-3); }
  .pass-dot.no  { background: var(--bear-3); }

  /* ── SUMMARY BAR ── */
  .summary-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin: 20px 40px;
  }

  .summary-cell {
    background: var(--surface);
    padding: 14px 20px;
    text-align: center;
  }

  .summary-cell .sv {
    font-family: 'Space Mono', monospace;
    font-size: 1.5rem;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }

  .summary-cell .sl {
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 5px;
  }

  .sv.bull { color: var(--bull-3); }
  .sv.bear { color: var(--bear-3); }
  .sv.neut { color: #ffd166; }

  /* ── ADR CHIP ── */
  .adr-chip {
    font-size: 0.58rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    header { padding: 20px; }
    .legend-strip, .metric-tabs { padding-left: 20px; padding-right: 20px; }
    .heatmap-wrap { padding: 0 20px 20px; }
    .summary-bar { margin: 16px 20px; }
    .summary-bar { grid-template-columns: 1fr 1fr; }
    .drawer { width: 100vw; }
  }
</style>
</head>

  <div class="summary-cell">

    <div class="sl">Market Pulse Score</div>
  </div>
</div>

<!-- Detail Drawer -->
<div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div>
      <div class="drawer-sector-title" id="drawerTitle">—</div>
      <div class="drawer-date" id="drawerDate">—</div>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body">
    <div class="drawer-score-grid" id="drawerScoreGrid"></div>

          <th>Vol↑</th>
        </tr>
      </thead>
      <tbody id="drawerTable"></tbody>
    </table>
  </div>
</div>

// ── STATE ──
let activeMetric = 'composite';
let activeSector = null;

// ── COLOR ENGINE ──
function scoreToColor(score) {
  if (score >= 80) return '#00ff88';
  if (score >= 65) return '#23c56e';
  if (score >= 50) return '#1aaa5c';
  if (score >= 40) return '#2a3a2e';
  if (score >= 30) return '#2a2a3d';
  if (score >= 20) return '#7a1f2e';
  if (score >= 10) return '#a02030';
  return '#ff2d42';
}

function scoreToBg(score) {
  if (score >= 65) return 'linear-gradient(135deg, #0a1f14 0%, #091a10 100%)';
  if (score >= 40) return 'linear-gradient(135deg, #0f0f1a 0%, #0d0d16 100%)';
  return 'linear-gradient(135deg, #1a090c 0%, #140809 100%)';
}

function getMetricScore(data) {
  switch (activeMetric) {
    case 'minervini':   return data.minervini_pct;
    case 'qullamaggie': return data.qullamaggie_pct;
    case 'volume':      return data.surge_pct;
    default:            return data.bullish_score;
  }
}

function signalLabel(score) {
  if (score >= 65) return { text: '▲ BULLISH', color: '#00ff88' };
  if (score >= 40) return { text: '◆ NEUTRAL', color: '#ffd166' };
  return { text: '▼ BEARISH', color: '#ff2d42' };
}

// ── RENDER HEATMAP ──
function renderHeatmap() {
  const grid = document.getElementById('heatmapGrid');
  const sectors = SCAN_DATA.sectors;
  grid.innerHTML = '';

  let bull = 0, neut = 0, bear = 0, totalScore = 0;
  const sectorList = Object.values(sectors);

  // Sort by current metric
  sectorList.sort((a, b) => getMetricScore(b) - getMetricScore(a));

  sectorList.forEach((data, i) => {
    const score   = getMetricScore(data);
    const color   = scoreToColor(score);
    const bg      = scoreToBg(data.bullish_score);
    const signal  = signalLabel(data.bullish_score);
    const circumference = 2 * Math.PI * 20;
    const dash    = (data.bullish_score / 100) * circumference;

    if (data.bullish_score >= 65) bull++;
    else if (data.bullish_score >= 40) neut++;
    else bear++;
    totalScore += data.bullish_score;

    const hasSurge  = data.surge_pct >= 30;
    const surgeText = hasSurge
      ? `<span class="surge-badge bullish">⚡ Vol Surge ${data.surge_pct}%</span>`
      : `<span class="surge-badge neutral">Vol Quiet ${data.surge_pct}%</span>`;

    const card = document.createElement('div');
    card.className = 'sector-card';
    card.style.cssText = `background:${bg}; border-color: ${color}22; animation-delay:${i * 0.05}s`;
    card.innerHTML = `
      <div class="card-header">
        <div class="sector-name">${data.sector}</div>
        <div class="sector-signal" style="color:${signal.color}">${signal.text}</div>
        <div class="score-area">
          <div class="score-ring">
            <svg viewBox="0 0 50 50" width="52" height="52">
              <circle class="track" cx="25" cy="25" r="20"/>
              <circle class="fill" cx="25" cy="25" r="20"
                stroke="${color}"
                stroke-dasharray="${dash} ${circumference}"
                stroke-dashoffset="0"/>
            </svg>
            <div class="score-number">${Math.round(data.bullish_score)}</div>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="metric-row">
          <span class="metric-label">Minervini</span>
          <div class="metric-bar-wrap">
            <div class="metric-bar-fill" style="width:${data.minervini_pct}%;background:#7b61ff"></div>
          </div>
          <span class="metric-value">${data.minervini_pct}%</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">Quillamag</span>
          <div class="metric-bar-wrap">
            <div class="metric-bar-fill" style="width:${data.qullamaggie_pct}%;background:#00c9ff"></div>
          </div>
          <span class="metric-value">${data.qullamaggie_pct}%</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">Vol Surge</span>
          <div class="metric-bar-wrap">
            <div class="metric-bar-fill" style="width:${data.surge_pct}%;background:#ffd166"></div>
          </div>
          <span class="metric-value">${data.surge_pct}%</span>
        </div>
        ${surgeText}
        <div class="adr-chip">Avg ADR ${data.avg_adr}%</div>
      </div>
    `;
    card.addEventListener('click', () => openDrawer(data.sector));
    grid.appendChild(card);
  });

  // Summary bar
  document.getElementById('sumBull').textContent = bull;
  document.getElementById('sumNeut').textContent = neut;
  document.getElementById('sumBear').textContent = bear;
  const avg = sectorList.length ? Math.round(totalScore / sectorList.length) : 0;
  const avgEl = document.getElementById('sumAvg');
  avgEl.textContent = avg;
  avgEl.style.color = scoreToColor(avg);

  // Meta
  document.getElementById('scanDate').textContent = SCAN_DATA.scan_date;
  document.getElementById('stockCount').textContent =
    `${sectorList.reduce((a, s) => a + (s.stocks || []).length, 0)} stocks scanned`;
}

// ── METRIC TAB SWITCH ──
function setMetric(m) {
  activeMetric = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderHeatmap();
}

// ── DRAWER ──
function openDrawer(sectorName) {
  const data = SCAN_DATA.sectors[sectorName];
  if (!data) return;

  const signal = signalLabel(data.bullish_score);

  document.getElementById('drawerTitle').textContent = sectorName;
  document.getElementById('drawerDate').textContent = SCAN_DATA.scan_date;

  document.getElementById('drawerScoreGrid').innerHTML = `
    <div class="score-box">
      <div class="sb-value" style="color:${scoreToColor(data.bullish_score)}">${data.bullish_score}</div>
      <div class="sb-label">Bull Score</div>
    </div>
    <div class="score-box">
      <div class="sb-value" style="color:#7b61ff">${data.minervini_pct}%</div>
      <div class="sb-label">Minervini</div>
    </div>
    <div class="score-box">
      <div class="sb-value" style="color:#00c9ff">${data.qullamaggie_pct}%</div>
      <div class="sb-label">Qullamag</div>
    </div>
    <div class="score-box">
      <div class="sb-value" style="color:#ffd166">${data.surge_pct}%</div>
      <div class="sb-label">Vol Surge</div>
    </div>
    <div class="score-box">
      <div class="sb-value">${data.avg_adr}%</div>
      <div class="sb-label">Avg ADR</div>
    </div>
    <div class="score-box">
      <div class="sb-value" style="color:${signal.color}">${signal.text}</div>
      <div class="sb-label">Signal</div>
    </div>
  `;

  const tbody = document.getElementById('drawerTable');
  tbody.innerHTML = '';

  (data.stocks || [])
    .sort((a, b) => b.minervini_score - a.minervini_score)
    .forEach(s => {
      const tick = s.ticker.replace('.NS', '');
      const mPass = s.minervini_passed;
      const qPass = s.qullamaggie_passed;
      const vol   = s.volume_surge;
      const rs    = s.rs_return > 0 ? `+${s.rs_return}%` : `${s.rs_return}%`;
      const rsColor = s.rs_return > 0 ? '#00ff88' : '#ff2d42';

      tbody.innerHTML += `
        <tr>
          <td class="tick">${tick}</td>
          <td><span class="pass-dot ${mPass ? 'yes' : 'no'}"></span></td>
          <td><span class="pass-dot ${qPass ? 'yes' : 'no'}"></span></td>
          <td>${s.adr}%</td>
          <td style="color:${rsColor}">${rs}</td>
          <td>${vol.bullish_surge ? '⚡' : '—'}</td>
        </tr>
      `;
    });

  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ── INIT ──
renderHeatmap();
</script>
